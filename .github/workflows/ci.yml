name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      ENV: test
      DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app
      REDIS_URL: redis://localhost:6379/0
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check .

      - name: Mypy (type check)
        run: uv run mypy app

      - name: Alembic upgrade (migrate)
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest -q

      - name: Docker build (api)
        working-directory: .
        run: docker build -f backend/Dockerfile -t jaamcode-api:ci backend